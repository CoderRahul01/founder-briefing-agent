<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Foundtel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #000;
        color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body class="min-h-screen">
    <nav
      class="border-b border-white/5 py-4 px-8 flex justify-between items-center glass sticky top-0 z-50"
    >
      <div class="flex items-center space-x-2">
        <div
          class="w-8 h-8 bg-white rounded-lg flex items-center justify-center"
        >
          <div class="w-4 h-4 bg-black rounded-sm rotate-45"></div>
        </div>
        <span class="text-xl font-bold tracking-tight">Foundtel</span>
      </div>
      {% if user %}
      <div class="flex items-center space-x-6">
        <a
          href="/dashboard"
          class="text-sm text-white/70 hover:text-white transition-colors"
          >Dashboard</a
        >
        <a
          href="/settings"
          class="text-sm text-white/70 hover:text-white transition-colors"
          >Settings</a
        >
        <div class="flex items-center space-x-3 pl-6 border-l border-white/10">
          <span class="text-sm text-white/50">{{ user.email }}</span>
          <a
            href="/logout"
            class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full transition-colors"
            >Logout</a
          >
        </div>
      </div>
      {% endif %}
    </nav>

    <main class="max-w-6xl mx-auto px-8 py-12">
      {% block content %}{% endblock %}
    </main>

    <footer
      class="border-t border-white/5 py-8 text-center text-white/30 text-sm"
    >
      &copy; 2026 Foundtel AI. All rights reserved.
    </footer>
  </body>
</html>
