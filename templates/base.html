<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Foundtel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(94, 234, 212, 0.12), transparent 28%),
          radial-gradient(circle at right top, rgba(255, 255, 255, 0.08), transparent 22%),
          linear-gradient(180deg, #050816 0%, #030712 100%);
        color: #fff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .glass {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
      }
    </style>
  </head>
  <body class="min-h-screen">
    <nav class="border-b border-white/10 py-4 px-6 md:px-8 flex justify-between items-center glass sticky top-0 z-50">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-lg shadow-white/10">
          <div class="w-5 h-5 bg-black rounded-md rotate-45"></div>
        </div>
        <div>
          <span class="text-xl font-bold tracking-tight block">Foundtel</span>
          <span class="text-xs text-white/45 uppercase tracking-[0.2em]">AI chief of staff</span>
        </div>
      </div>
      {% if user %}
      <div class="flex items-center space-x-6">
        <a href="/dashboard" class="text-sm text-white/70 hover:text-white transition-colors">Dashboard</a>
        <a href="/settings" class="text-sm text-white/70 hover:text-white transition-colors">Settings</a>
        <div class="hidden md:flex items-center space-x-3 pl-6 border-l border-white/10">
          <span class="text-sm text-white/50">{{ user.email }}</span>
          <a href="/logout" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full transition-colors">Logout</a>
        </div>
      </div>
      {% endif %}
    </nav>

    <main class="max-w-7xl mx-auto px-6 md:px-8 py-10 md:py-12">
      {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-white/10 py-8 text-center text-white/30 text-sm mt-10">
      &copy; 2026 Foundtel AI. Built to turn noisy founder mornings into clearer decisions.
    </footer>
  </body>
</html>
